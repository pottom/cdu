# daylight — charm's identity on paper: the same pink-to-purple gradient, with
# every token darkened until it carries on a white terminal. The accents are not
# charm's own, because #ff5fd1 on white is about 2:1 and unreadable; they are the
# same hues taken to a legible lightness.
#
# `light` says this theme expects a light terminal. cdu never paints the
# background — your terminal's own shows through, which is what keeps
# transparency and blur working — so on a dark terminal this theme is unreadable
# rather than merely unusual. `cdu themes` says which are which.
light: true

# On a light theme the panel is *darker* than the field, and `selected` is darker
# than `text` rather than brighter. Everything inverts except the roles' names.
panel: "#ece6f8"
text: "#3b3450"
dir: "#1e1830"
selected: "#14101f"
ink: "#ffffff" # light: it lands on this theme's dark, saturated chips
dim: "#7a7191"
accent: "#c0179c"
size: "#0f7a63"
danger: "#c01d5e"

bar-from: "#d63bb0"
bar-to: "#6b4fe0"
bar-track: "#ded6f0"
