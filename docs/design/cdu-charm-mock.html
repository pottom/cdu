<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cdu · charm disk usage — mock</title>
<style>
  :root{
    --bg:#17131f;          /* deep aubergine, not pure black — Charm leans purple */
    --term:#1d1729;        /* terminal body */
    --panel:#241c34;       /* inner rounded panels */
    --edge:#3a2f52;        /* border lines */
    --pink:#ff5fd1;        /* Charm signature */
    --hot:#ff2fb3;
    --purple:#8b6dff;      /* lipgloss purple */
    --lav:#cfc6ef;         /* body text */
    --dim:#7d739e;         /* muted */
    --mint:#4ff0c0;        /* size accent */
    --amber:#ffcc66;
    --sel:#ff5fd1;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(139,109,255,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,95,209,.14), transparent 55%),
      var(--bg);
    color:var(--lav);
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    display:flex;align-items:center;justify-content:center;
    padding:24px;min-height:100%;
  }
  .term{
    width:min(880px,100%);
    background:var(--term);
    border:1px solid var(--edge);
    border-radius:14px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,95,209,.05);
    overflow:hidden;
  }
  /* window chrome */
  .chrome{
    display:flex;align-items:center;gap:8px;
    padding:11px 14px;
    background:linear-gradient(180deg, rgba(255,255,255,.03), transparent);
    border-bottom:1px solid var(--edge);
  }
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .chrome .title{
    margin-left:8px;color:var(--dim);font-size:12.5px;letter-spacing:.3px;
  }
  .chrome .title b{color:var(--lav);font-weight:600}

  .screen{padding:16px 18px 14px;font-size:14px;line-height:1.55}
  @media (max-width:560px){ .screen{font-size:11.5px;padding:12px} }

  /* header panel — rounded lipgloss box */
  .head{
    border:1px solid var(--edge);
    border-radius:10px;
    padding:12px 14px;
    background:linear-gradient(180deg, rgba(139,109,255,.06), rgba(255,95,209,.02));
    margin-bottom:12px;
  }
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .word{
    font-weight:800;font-size:19px;letter-spacing:1px;
    background:linear-gradient(90deg,var(--pink),var(--purple) 70%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tag{
    font-size:11px;color:var(--purple);border:1px solid var(--purple);
    border-radius:999px;padding:2px 9px;letter-spacing:.5px;opacity:.9;
  }
  .path{color:var(--dim);font-size:12.5px;margin-left:auto}
  .path b{color:var(--mint)}
  .diskline{display:flex;align-items:center;gap:12px;margin-top:11px}
  .disklabel{color:var(--dim);font-size:12px;white-space:nowrap}
  .diskbar{flex:1;height:9px;border-radius:6px;background:#2c2340;overflow:hidden;position:relative}
  .diskfill{
    height:100%;width:0;border-radius:6px;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    transition:width 1.1s cubic-bezier(.2,.7,.2,1);
  }
  .diskpct{color:var(--lav);font-size:12px;white-space:nowrap}
  .diskpct b{color:var(--pink)}

  /* scanning shimmer */
  .scan{color:var(--dim);font-size:12.5px;margin:2px 2px 10px;height:16px}
  .scan .k{color:var(--mint)}
  .cursor{display:inline-block;width:8px;height:14px;background:var(--pink);
    vertical-align:-2px;animation:blink 1s steps(2) infinite;margin-left:2px}
  @keyframes blink{50%{opacity:0}}

  /* list */
  .list{display:flex;flex-direction:column;gap:1px}
  .row{
    display:grid;grid-template-columns:22px 78px 1fr 52px;
    align-items:center;gap:10px;
    padding:5px 10px;border-radius:8px;cursor:pointer;
    border:1px solid transparent;
  }
  .row .ic{font-size:13px;color:var(--purple);text-align:center}
  .row .sz{color:var(--mint);text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
  .row .nm{color:var(--lav);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .pc{color:var(--dim);text-align:right;font-size:12px;font-variant-numeric:tabular-nums}
  .bar{grid-column:3 / 5;height:6px;border-radius:4px;background:#2a2140;overflow:hidden;margin-top:5px}
  .barfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--pink),var(--purple))}
  .row.dir .nm{color:#e9e3ff}
  .row.dir .ic{color:var(--pink)}
  /* the pink selection — the signature glow */
  .row.on{
    background:linear-gradient(90deg, rgba(255,95,209,.16), rgba(139,109,255,.10));
    border-color:var(--pink);
    box-shadow:0 0 0 1px rgba(255,95,209,.25), 0 8px 24px -12px rgba(255,95,209,.5);
  }
  .row.on .nm{color:#fff}
  .row.on .pc{color:var(--lav)}

  /* footer key hints */
  .foot{
    display:flex;flex-wrap:wrap;gap:7px;align-items:center;
    margin-top:13px;padding-top:12px;border-top:1px solid var(--edge);
  }
  .key{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--dim)}
  .kb{
    background:linear-gradient(180deg,#33264c,#281e3c);
    border:1px solid var(--edge);border-bottom-color:#160f24;
    color:var(--pink);border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;
  }
  .spacer{flex:1}
  .hint{color:var(--purple);font-size:11px;opacity:.8}

  /* delete modal */
  .modal-wrap{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(10,7,16,.55);backdrop-filter:blur(2px);border-radius:14px}
  .modal-wrap.show{display:flex}
  .modal{
    width:min(420px,86%);background:var(--panel);
    border:1px solid var(--pink);border-radius:12px;padding:18px 18px 16px;
    box-shadow:0 20px 60px -10px rgba(255,95,209,.4);
  }
  .modal h3{margin:0 0 8px;color:#fff;font-size:15px;font-weight:700}
  .modal p{margin:0 0 16px;color:var(--lav);font-size:13px;line-height:1.5}
  .modal p b{color:var(--pink)}
  .modal .btns{display:flex;gap:10px;justify-content:flex-end}
  .btn{font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;
    border-radius:8px;padding:7px 15px;border:1px solid var(--edge);
    background:#2a2140;color:var(--lav)}
  .btn.danger{background:linear-gradient(180deg,var(--hot),#d61f96);border-color:var(--hot);color:#fff}
  .term{position:relative}
  @media (prefers-reduced-motion:reduce){
    .diskfill{transition:none}.cursor{animation:none}
  }
</style>
</head>
<body>
  <div class="term" id="term">
    <div class="chrome">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">— <b>cdu</b> · charm disk usage — ~/</span>
    </div>
    <div class="screen">
      <div class="head">
        <div class="brand">
          <span class="word">cdu ✦</span>
          <span class="tag">charm disk usage</span>
          <span class="path" id="path">scanning <b>~/</b></span>
        </div>
        <div class="diskline">
          <span class="disklabel">Macintosh HD</span>
          <div class="diskbar"><div class="diskfill" id="diskfill"></div></div>
          <span class="diskpct" id="diskpct"><b>—</b> / 994 GB</span>
        </div>
      </div>

      <div class="scan" id="scan">◐ walking directories<span class="cursor"></span></div>
      <div class="list" id="list"></div>

      <div class="foot">
        <span class="key"><span class="kb">↑↓</span> move</span>
        <span class="key"><span class="kb">→</span> open</span>
        <span class="key"><span class="kb">←</span> back</span>
        <span class="key"><span class="kb">d</span> delete</span>
        <span class="spacer"></span>
        <span class="hint" id="hint">sorted by size · desc</span>
      </div>
    </div>

    <div class="modal-wrap" id="modalWrap">
      <div class="modal">
        <h3>Delete this item?</h3>
        <p>You're about to remove <b id="delName">—</b> (<span id="delSize">—</span>). This can't be undone.</p>
        <div class="btns">
          <button class="btn" id="cancelBtn">Cancel</button>
          <button class="btn danger" id="confirmBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

<script>
// ---- fake filesystem tree (sizes in MB) ----
const tree = {
  name:'~', children:[
    {name:'Library', dir:true, size:214000, children:[
      {name:'Caches', dir:true, size:96000},
      {name:'Application Support', dir:true, size:71000},
      {name:'Developer', dir:true, size:28000},
      {name:'Containers', dir:true, size:12500},
      {name:'Logs', dir:true, size:4200},
      {name:'Preferences', dir:true, size:340},
    ]},
    {name:'Developer', dir:true, size:88000, children:[
      {name:'node_modules', dir:true, size:41000},
      {name:'DerivedData', dir:true, size:26000},
      {name:'go', dir:true, size:12000},
      {name:'rust-target', dir:true, size:8300},
      {name:'cdu', dir:true, size:640},
    ]},
    {name:'Movies', dir:true, size:63000},
    {name:'Downloads', dir:true, size:41000},
    {name:'Pictures', dir:true, size:22000},
    {name:'.cache', dir:true, size:9400},
    {name:'Music', dir:true, size:7800},
    {name:'Documents', dir:true, size:3100},
    {name:'Desktop', dir:true, size:1200},
    {name:'.zsh_history', dir:false, size:6},
  ]
};

const TOTAL_MB = 994*1024;   // disk total
const USED_PCT = 63;

const listEl = document.getElementById('list');
const pathEl = document.getElementById('path');
const scanEl = document.getElementById('scan');
const hintEl = document.getElementById('hint');
let stack = [tree];         // navigation stack
let sel = 0;
let reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

function fmt(mb){
  if(mb>=1024) return (mb/1024).toFixed(mb>=10240?0:1)+' GB';
  return mb+' MB';
}
function cur(){ return stack[stack.length-1]; }
function items(){ return (cur().children||[]).slice().sort((a,b)=>b.size-a.size); }

function render(){
  const it = items();
  const max = it.length?it[0].size:1;
  listEl.innerHTML='';
  it.forEach((n,i)=>{
    const row=document.createElement('div');
    row.className='row '+(n.dir?'dir':'file')+(i===sel?' on':'');
    const pct=Math.round(n.size/cur().size*100)||0;
    const w=Math.max(3,Math.round(n.size/max*100));
    row.innerHTML=`
      <span class="ic">${n.dir?'▸':'·'}</span>
      <span class="sz">${fmt(n.size)}</span>
      <span class="nm">${n.name}${n.dir?'/':''}</span>
      <span class="pc">${pct}%</span>
      <div class="bar"><div class="barfill" style="width:${w}%"></div></div>`;
    row.onclick=()=>{ sel=i; render(); };
    row.ondblclick=()=>{ if(n.dir&&n.children) descend(i); };
    listEl.appendChild(row);
  });
  // breadcrumb
  const crumb = stack.map(s=>s.name).join('/').replace('~/','~/');
  pathEl.innerHTML='at <b>'+crumb+(stack.length>1?'/':'/')+'</b>';
}

function descend(i){
  const it=items();
  if(it[i]&&it[i].dir&&it[i].children){ stack.push(it[i]); sel=0; render(); }
}
function ascend(){ if(stack.length>1){ const child=stack.pop();
  const sib=items(); sel=Math.max(0,sib.findIndex(x=>x.name===child.name)); render(); } }

// delete modal
const modalWrap=document.getElementById('modalWrap');
function askDelete(){
  const n=items()[sel]; if(!n) return;
  document.getElementById('delName').textContent=n.name+(n.dir?'/':'');
  document.getElementById('delSize').textContent=fmt(n.size);
  modalWrap.classList.add('show');
}
document.getElementById('cancelBtn').onclick=()=>modalWrap.classList.remove('show');
document.getElementById('confirmBtn').onclick=()=>{
  const it=items(); const n=it[sel];
  const arr=cur().children; const idx=arr.indexOf(n);
  if(idx>-1) arr.splice(idx,1);
  sel=Math.max(0,sel-1);
  modalWrap.classList.remove('show'); render();
};

// keyboard
document.addEventListener('keydown',e=>{
  if(modalWrap.classList.contains('show')){
    if(e.key==='Escape') modalWrap.classList.remove('show');
    if(e.key==='Enter') document.getElementById('confirmBtn').click();
    return;
  }
  const n=items().length;
  if(e.key==='ArrowDown'||e.key==='j'){ sel=(sel+1)%n; render(); e.preventDefault(); }
  else if(e.key==='ArrowUp'||e.key==='k'){ sel=(sel-1+n)%n; render(); e.preventDefault(); }
  else if(e.key==='ArrowRight'||e.key==='l'||e.key==='Enter'){ descend(sel); e.preventDefault(); }
  else if(e.key==='ArrowLeft'||e.key==='h'||e.key==='Backspace'){ ascend(); e.preventDefault(); }
  else if(e.key==='d'){ askDelete(); e.preventDefault(); }
});

// ---- boot: fake scan animation, then reveal ----
function boot(){
  const fill=document.getElementById('diskfill');
  const pct=document.getElementById('diskpct');
  if(reduce){
    scanEl.style.display='none'; fill.style.width=USED_PCT+'%';
    pct.innerHTML='<b>627 GB</b> / 994 GB'; render(); return;
  }
  let p=0;
  const frames=['◐','◓','◑','◒'];
  const int=setInterval(()=>{
    p+=Math.random()*22;
    scanEl.innerHTML=frames[Math.floor(Math.random()*4)]+
      ' walking directories · '+Math.min(100,Math.round(p))+'%'+
      '<span class="cursor"></span>';
    if(p>=100){
      clearInterval(int);
      scanEl.style.display='none';
      fill.style.width=USED_PCT+'%';
      pct.innerHTML='<b>627 GB</b> / 994 GB';
      render();
    }
  },140);
}
boot();
</script>
</body>
</html>
