on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: run tests
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.x
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Run linters
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11.2

  test:
    strategy:
      matrix:
        go-version: [1.25.x, 1.26.x]
        platform: [ubuntu-latest]
        include:
          - go-version: 1.26.x
            platform: macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Install Go
      if: success()
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Run tests
      run: go test -v -covermode=count ./...
