on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: run tests
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.x
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Run linters
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11.2
        # Skip `golangci-lint config verify`, which fetches a JSON schema from
        # golangci-lint.run to validate .golangci.yml. That network call timed out
        # and failed the lint job (only on main, where it emails) with a schema-load
        # error that has nothing to do with the code. The linters themselves still run.
        verify: false

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.x
    # Validate the release config on every PR, so a broken .goreleaser.yaml is caught
    # here rather than at the one moment it runs for real — a pushed release tag.
    - name: Check GoReleaser config
      uses: goreleaser/goreleaser-action@v6
      with:
        version: "~> v2"
        args: check

  test:
    strategy:
      matrix:
        go-version: [1.25.x, 1.26.x]
        platform: [ubuntu-latest]
        include:
          - go-version: 1.26.x
            platform: macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Install Go
      if: success()
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Run tests
      run: go test -v -covermode=count ./...

  bench:
    runs-on: ubuntu-latest
    steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.x
    - name: Checkout code
      uses: actions/checkout@v6
    # A tripwire, not a gate: it runs the render-hot-path benchmarks so they stay
    # compilable and a gross regression — I/O sneaking into View, or the list rendering
    # scaling with directory size — shows up in the log. A shared runner is far too
    # noisy for a hard pass/fail threshold, so there is none; the standing proof is that
    # BenchmarkView is flat from 100 to 10,000 rows.
    - name: Run render benchmarks
      run: go test -run=^$ -bench=. -benchtime=20x ./charm/
