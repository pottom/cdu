name: release

# A push of a cdu-vX.Y.Z tag cuts the release: GoReleaser cross-compiles the matrix,
# builds the archives and checksums, generates SBOMs, signs the checksums with keyless
# cosign, and publishes the GitHub release. Nothing runs on a plain vX.Y.Z tag — those
# are gdu's, inherited from the fork.
on:
  push:
    tags:
      - "cdu-v*"

permissions:
  contents: write # create the release and upload assets
  id-token: write # keyless cosign signing via OIDC
  packages: write # the container image (added with the dockers config)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # GoReleaser needs the full history and all tags to build the changelog and
          # resolve the version.
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # The pushed tag is cdu-vX.Y.Z; GoReleaser (OSS) needs a semver tag, so strip the
      # cdu- prefix and hand it the clean vX.Y.Z. GoReleaser then publishes the release
      # as vX.Y.Z, while cdu-vX.Y.Z stays as the trigger tag the Makefile reads.
      - name: Resolve release version
        run: echo "GORELEASER_CURRENT_TAG=${GITHUB_REF_NAME#cdu-}" >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
